services:
  - type: web
    name: marketing-abgroup
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: AB_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SHEET_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
